services:
  db:
    image: postgres:18.2
    container_name: greenmarket_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: GreenMarket
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./back-end/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: ./back-end
      dockerfile: ./docker/node/Dockerfile
    container_name: greenmarket_api
    env_file:
      - ./back-end/.env
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  pg_data:
